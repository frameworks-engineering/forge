name: Build Forge (Nintendo DS)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install libnds
        run: |
          dkp-pacman -S nds-dev --noconfirm

      - name: Set up environment
        run: |
          echo "/opt/devkitpro/devkitARM/bin" >> $GITHUB_PATH
          echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV

      - name: Check libnds headers
        run: |
          find /opt/devkitpro -name calico.h -type f || echo "calico.h not found"
          ls -la /opt/devkitpro/libnds/include/

      - name: Build Forge
        run: |
          make clean
          make

      - name: Upload Forge .nds artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-nds
          path: forge.nds
          if-no-files-found: error
