name: Build Forge (Nintendo DS)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Forge
        run: |
          make clean
          make

      - name: Upload Forge .nds artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-nds
          path: forge.nds
          if-no-files-found: error
